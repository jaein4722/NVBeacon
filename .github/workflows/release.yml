name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Show Swift version
        run: swift --version

      - name: Derive version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build DMG artifact
        run: |
          chmod +x ./scripts/package_app.sh
          VERSION="$VERSION" BUILD_NUMBER="$BUILD_NUMBER" ./scripts/package_app.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPUUsage-${{ env.VERSION }}-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.dmg)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
