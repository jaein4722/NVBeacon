name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        shell: bash
        run: |
          shopt -s nullglob
          candidates=(/Applications/Xcode_26*.app)

          if [ ${#candidates[@]} -gt 0 ]; then
            IFS=$'\n' sorted=($(printf '%s\n' "${candidates[@]}" | sort -V))
            selected="${sorted[${#sorted[@]}-1]}"
            echo "DEVELOPER_DIR=$selected/Contents/Developer" >> "$GITHUB_ENV"
            echo "Selected Xcode: $selected"
            exit 0
          fi

          current_version="$(xcodebuild -version | awk 'NR==1 {print $2}')"
          if [[ "$current_version" == 26.* ]]; then
            echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
            echo "Using default Xcode.app ($current_version)"
            exit 0
          fi

          echo "No Xcode 26 installation found on runner." >&2
          ls -1 /Applications | grep '^Xcode' || true
          exit 1

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [[ -z "${DEVELOPER_ID_P12_BASE64:-}" ]]; then
            echo "DEVELOPER_ID_P12_BASE64 secret is required for CI code signing." >&2
            exit 1
          fi
          if [[ -z "${DEVELOPER_ID_P12_PASSWORD:-}" ]]; then
            echo "DEVELOPER_ID_P12_PASSWORD secret is required for CI code signing." >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/nvbeacon-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          P12_PATH="$RUNNER_TEMP/developer-id.p12"
          export P12_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["P12_PATH"]).write_bytes(
              base64.b64decode(os.environ["DEVELOPER_ID_P12_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security login-keychain -d user | tr -d '\"')"

          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Resolve Developer ID identity
        run: |
          CODESIGN_IDENTITY="$(security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH" | awk -F '\"' '/Developer ID Application:/ { print $2; exit }')"

          if [[ -z "$CODESIGN_IDENTITY" ]]; then
            echo "No Developer ID Application identity found after importing the certificate." >&2
            security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "Resolved code signing identity: $CODESIGN_IDENTITY"
          echo "CODESIGN_IDENTITY=$CODESIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [[ -z "${APPLE_ID:-}" ]]; then
            echo "APPLE_ID secret is required for notarization." >&2
            exit 1
          fi
          if [[ -z "${APPLE_TEAM_ID:-}" ]]; then
            echo "APPLE_TEAM_ID secret is required for notarization." >&2
            exit 1
          fi
          if [[ -z "${APPLE_APP_PASSWORD:-}" ]]; then
            echo "APPLE_APP_PASSWORD secret is required for notarization." >&2
            exit 1
          fi

          xcrun notarytool store-credentials "NVBeaconNotary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Derive version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CHANGELOG_NOTES_PATH=${RUNNER_TEMP}/changelog-notes.md" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=${RUNNER_TEMP}/release-notes.md" >> "$GITHUB_ENV"
          echo "APPCAST_PATH=${RUNNER_TEMP}/appcast.xml" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=NVBeacon ${GITHUB_REF_NAME#v}: macOS menu bar app for remote NVIDIA GPU monitoring over SSH" >> "$GITHUB_ENV"

      - name: Extract release notes from changelog
        run: |
          python3 ./scripts/extract_release_notes.py \
            --version "$VERSION" \
            --changelog CHANGELOG.md \
            --output "$CHANGELOG_NOTES_PATH"

      - name: Prepare public release notes
        run: |
          {
            printf '%s\n\n' 'NVBeacon is a native macOS menu bar app for monitoring remote NVIDIA GPU servers over SSH with `nvidia-smi`, process exit alerts, and GPU idle notifications.'
            cat "$CHANGELOG_NOTES_PATH"
          } > "$RELEASE_NOTES_PATH"

      - name: Build DMG artifact
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [[ -z "${SPARKLE_PUBLIC_ED_KEY:-}" ]]; then
            echo "SPARKLE_PUBLIC_ED_KEY secret is required for secure Sparkle updates." >&2
            exit 1
          fi

          chmod +x ./scripts/package_app.sh
          VERSION="$VERSION" BUILD_NUMBER="$BUILD_NUMBER" \
            CODESIGN_IDENTITY="$CODESIGN_IDENTITY" \
            NOTARIZE=1 \
            KEYCHAIN_PROFILE="NVBeaconNotary" \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY" \
            ./scripts/package_app.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NVBeacon-${{ env.VERSION }}-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.dmg)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          fi

      - name: Generate signed appcast feed
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "SPARKLE_PRIVATE_ED_KEY secret is required for secure Sparkle updates." >&2
            exit 1
          fi

          APPCAST_WORKDIR="${RUNNER_TEMP}/appcast-workdir"
          rm -rf "$APPCAST_WORKDIR"
          mkdir -p "$APPCAST_WORKDIR"

          cp "dist/NVBeacon-${VERSION}.dmg" "$APPCAST_WORKDIR/"
          cp "$RELEASE_NOTES_PATH" "$APPCAST_WORKDIR/NVBeacon-${VERSION}.md"

          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/${{ github.repository }}" \
            --full-release-notes-url "https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" \
            --embed-release-notes \
            --maximum-versions 1 \
            -o "$APPCAST_PATH" \
            "$APPCAST_WORKDIR"

      - name: Publish appcast branch
        env:
          REPOSITORY_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          APPCAST_REPO="${RUNNER_TEMP}/appcast-repo"
          rm -rf "$APPCAST_REPO"

          if git clone --depth 1 --branch appcast "$REPOSITORY_URL" "$APPCAST_REPO"; then
            :
          else
            git clone --depth 1 "$REPOSITORY_URL" "$APPCAST_REPO"
            cd "$APPCAST_REPO"
            git switch --orphan appcast
          fi

          cd "$APPCAST_REPO"
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp "$APPCAST_PATH" appcast.xml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml

          if git diff --cached --quiet; then
            echo "Appcast is already up to date."
            exit 0
          fi

          git commit -m "Update appcast for $VERSION"
          git push origin HEAD:appcast --force

      - name: Dispatch Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Skipping homebrew-tap sync because HOMEBREW_TAP_TOKEN is not configured."
            exit 0
          fi

          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/NVBeacon-${VERSION}.dmg"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/jaein4722/homebrew-tap/dispatches" \
            -f event_type='nvbeacon_release_published' \
            -f client_payload[version]="$VERSION" \
            -f client_payload[tag]="$GITHUB_REF_NAME" \
            -f client_payload[dmg_url]="$DMG_URL"

      - name: Remove CI keychain
        if: always()
        run: |
          if [[ -n "${CI_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$CI_KEYCHAIN_PATH" || true
          fi
